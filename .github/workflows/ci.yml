name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck · Test · Build
        run: pnpm turbo run typecheck test build

      # eslint workspace'te henüz kurulu değil — bloklamasın (görünürlük için).
      - name: Lint (non-blocking)
        continue-on-error: true
        run: pnpm turbo run lint

  migrations:
    name: Migrations apply cleanly
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: churnify
          POSTGRES_PASSWORD: churnify
          POSTGRES_DB: churnify
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U churnify -d churnify"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql://churnify:churnify@localhost:5432/churnify
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run drizzle migrations
        run: pnpm --filter @churnify/api exec drizzle-kit migrate

  e2e-web:
    name: Playwright e2e (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared (web tipleri)
        run: pnpm --filter @churnify/shared build
      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium
      - name: Run e2e
        run: pnpm --filter web test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
