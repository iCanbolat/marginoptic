# SPA: tüm bilinmeyen yollar index.html'e düşer (client-side routing).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Statik varlıklar uzun cache (içerik-hash'li dosya adları).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
