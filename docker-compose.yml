services:
  postgres:
    image: postgres:17-alpine
    container_name: churnify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: churnify
      POSTGRES_PASSWORD: churnify
      POSTGRES_DB: churnify
    ports:
      # Host 5433 -> container 5432 (5432 başka projeler tarafından kullanılıyor olabilir)
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U churnify -d churnify"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: churnify-redis
    restart: unless-stopped
    ports:
      # Host 6380 -> container 6379
      - "6380:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
